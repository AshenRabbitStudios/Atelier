<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Agent Flow — TWO tabs (2026-07-21 rework; git is the primary pillar).

      - Repo: full git exploration — health strip (branch/dirty/last commit/CI/worktrees),
        working tree + diffs, commit history with graph gutter/refs/full message + per-file
        commit diffs, branches & worktrees annotated with which agent session is where,
        stashes, submodules, and GitHub CI status via `gh`. All read-only.
      - Agent: the debug log — every AgentEvent in exact arrival order with a tiered
        verbosity slider (turns → +tools → +everything → +raw JSON), filter chips, search.

      Host runtime injects window.atelier (all methods async). MUST be the first element in
      <head>; no external network / no CDN. All git/gh output is parsed in the service
      backend (backend.js + gitParse.cjs); the pane never parses .git itself. A non-git cwd
      or missing gh yields friendly empty states, never errors.
    -->
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <title>Agent Flow</title>
    <link rel="stylesheet" href="atelier-plugin://agent-flow/styles.css" />
  </head>
  <body>
    <div id="app">
      <nav id="tabs" role="tablist">
        <button class="tab" data-tab="repo" role="tab">Repo</button>
        <button class="tab" data-tab="agent" role="tab">Agent</button>
      </nav>

      <!-- Repo (primary) -->
      <section class="panel" data-panel="repo">
        <div id="health"></div>
        <div class="split">
          <div class="nav-col">
            <div class="scroll" id="repo-nav"></div>
          </div>
          <div class="detail-col">
            <div class="toolbar">
              <span class="col-title" id="rd-title">Select something on the left</span>
              <span class="rd-meta" id="rd-meta"></span>
            </div>
            <div class="scroll" id="rd-body"></div>
          </div>
        </div>
      </section>

      <!-- Agent (debug log) -->
      <section class="panel" data-panel="agent">
        <div class="toolbar agent-bar">
          <span class="vb-label">verbosity</span>
          <input id="ag-level" type="range" min="1" max="4" step="1" value="2" />
          <span class="vb-name" id="ag-level-name">tools</span>
          <span class="bar-sep"></span>
          <div class="chips" id="ag-filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="tools">Tools</button>
            <button class="chip" data-filter="files">Files</button>
            <button class="chip" data-filter="errors">Errors</button>
            <button class="chip" data-filter="atelier">Atelier</button>
          </div>
          <input id="ag-search" type="text" placeholder="search…" />
          <button class="btn" id="ag-pin" title="Keep scrolled to the newest event">
            ⇊ follow
          </button>
        </div>
        <div class="scroll" id="ag-list"></div>
      </section>
    </div>

    <script src="atelier-plugin://agent-flow/flow.js"></script>
  </body>
</html>
