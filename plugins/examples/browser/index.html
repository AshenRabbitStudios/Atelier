<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser</title>
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--surface, #14171e);
        color: var(--text, #e7eaf0);
        font-family: var(--font, system-ui, sans-serif);
      }

      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      #bar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--border, #252b37);
        font-size: 11px;
        color: var(--dim, #8b97ae);
      }

      #bar input[type='text'] {
        flex: 1 1 160px;
        min-width: 100px;
        padding: 3px 7px;
        border: 1px solid var(--border, #252b37);
        border-radius: 4px;
        background: var(--input, #0f1117);
        color: var(--text, #e7eaf0);
        font-family: var(--mono, monospace);
        font-size: 11px;
        outline: none;
      }

      #bar input[type='text']:focus {
        border-color: var(--accent, #5b9cff);
      }

      #bar button {
        padding: 3px 9px;
        border: 1px solid var(--border, #252b37);
        border-radius: 4px;
        background: var(--surface-2, #1a1e27);
        color: var(--text, #e7eaf0);
        font-size: 11px;
        cursor: pointer;
      }

      #bar button.primary {
        border: none;
        background: var(--accent, #5b9cff);
        color: var(--on-accent, #fff);
      }

      #bar label {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        user-select: none;
        cursor: pointer;
      }

      .seg {
        display: inline-flex;
        border: 1px solid var(--border, #252b37);
        border-radius: 4px;
        overflow: hidden;
      }

      .seg button {
        border: none !important;
        border-radius: 0 !important;
        background: transparent;
      }

      .seg button.on {
        background: var(--accent-weak, #23324a);
        color: var(--text, #e7eaf0);
      }

      .seg.nav button {
        min-width: 22px;
        padding: 3px 6px;
        font-size: 13px;
        line-height: 1;
      }

      .seg button:disabled {
        color: var(--faint, #5e6677);
        opacity: 0.5;
        cursor: default;
      }

      #status {
        flex: 1 1 100%;
        font-size: 10px;
        color: var(--faint, #5e6677);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #status b {
        color: var(--ok, #4caf82);
        font-weight: 600;
      }

      #view {
        flex: 1 1 0;
        min-height: 0;
        overflow: auto;
        position: relative;
      }

      #page {
        padding: 14px 16px;
        min-height: 100%;
      }

      /* Give agent/markdown content sane defaults without overriding its own styles too hard. */
      #page :where(h1, h2, h3) {
        line-height: 1.25;
      }
      #page :where(pre) {
        background: var(--bg-2, #0f1117);
        padding: 10px;
        border-radius: 4px;
        overflow: auto;
      }
      #page :where(code) {
        font-family: var(--mono, monospace);
      }
      #page :where(a) {
        color: var(--accent, #5b9cff);
      }
      #page :where(img) {
        max-width: 100%;
      }

      #source {
        margin: 0;
        padding: 14px 16px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--mono, monospace);
        font-size: 12px;
        line-height: 1.5;
        color: var(--dim, #8b97ae);
      }

      #toast {
        position: absolute;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        max-width: 90%;
        padding: 6px 12px;
        border-radius: 4px;
        background: var(--surface-3, #222835);
        border: 1px solid var(--border-2, #313847);
        color: var(--text, #e7eaf0);
        font-size: 11px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }

      #toast.show {
        opacity: 1;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="bar">
        <span class="seg nav">
          <button id="nav-back" type="button" title="Back" disabled>‹</button>
          <button id="nav-fwd" type="button" title="Forward" disabled>›</button>
          <button id="nav-reload" type="button" title="Reload" disabled>⟳</button>
          <button id="nav-stop" type="button" title="Stop" disabled>✕</button>
        </span>
        <input id="path" type="text" placeholder="file path (docs/NOTES.md) or https:// URL" />
        <button id="load">Load</button>
        <button id="clear">Clear</button>
        <span class="seg">
          <button id="mode-rendered" class="on">Rendered</button>
          <button id="mode-source">Source</button>
        </span>
        <label><input id="run-scripts" type="checkbox" checked /> Run&nbsp;scripts</label>
        <label><input id="stream" type="checkbox" checked /> Stream&nbsp;state</label>
        <button id="snapshot" class="primary">Snapshot</button>
        <span id="status">empty</span>
      </div>
      <div id="view">
        <div id="page"></div>
        <pre id="source" class="hidden"></pre>
        <div id="toast"></div>
      </div>
    </div>

    <script>
      // Browser surface. Inputs, in preference order: the agent sets `source` to a cwd-relative
      // file path (live-tailed over the DataBus file: channel) or an http(s) URL (one-shot host
      // fetch over the url: channel, needs net:fetch); the user types either into the box; or the
      // agent pushes a small HTML/Markdown fragment directly (the `content` export). The live page
      // state + on-demand snapshots go back to the agent as the `page` / `snapshot` exports.
      // Content renders in THIS document (not a nested frame) because the plugin sandbox
      // (allow-scripts, opaque origin) would make a child frame unreadable — rendering in-doc is
      // what lets us read the live, post-interaction DOM. Scripts in url-fetched content are NEVER
      // executed: remote JS running here could drive the atelier bridge (context.set → text the
      // agent trusts), so only local/agent content may opt into script execution.
      const el = (id) => document.getElementById(id)
      const pathInput = el('path')
      const pageEl = el('page')
      const sourceEl = el('source')
      const statusEl = el('status')
      const streamCb = el('stream')
      const runScriptsCb = el('run-scripts')

      const state = {
        mode: 'rendered', // 'rendered' | 'source'
        raw: '', // the current source text (HTML or Markdown)
        label: 'empty', // where it came from (a path, a URL, 'agent', …)
        channel: null, // the file:<path> / url:<href> channel we're subscribed to, if any
        remote: false, // current content arrived from a url: channel → its scripts never run
        base: '', // the source path/URL images resolve against ('' for pushed content / welcome)
        history: [], // visited sources (paths/URLs), for back/forward
        histIdx: -1, // index into history of the current source
        loading: false, // a source load/fetch is in flight (Stop cancels it)
        live: false, // URL shown live in the host's embedded Chromium surface (browser:embed)
        liveUrl: '', // the surface's current URL (tracks in-page navigation)
        webNav: { back: false, fwd: false } // the live surface's own history state
      }

      const isUrl = (s) => /^https?:\/\//i.test(s)
      // A src we should NOT touch: already absolute, a data/blob URI, or the plugin's own scheme.
      const isResolvedSrc = (u) => /^(https?:|data:|blob:|atelier-plugin:|#)/i.test(u)

      // posix-join a base dir with a relative ref, collapsing . and .. ; a leading '/' means the
      // cwd root. The host still enforces the cwd bound, so this only needs to be reasonable.
      function joinPath(baseDir, ref) {
        let dir = baseDir
        if (ref[0] === '/') {
          ref = ref.slice(1)
          dir = ''
        }
        const out = []
        for (const p of (dir ? dir.split('/') : []).concat(ref.split('/'))) {
          if (p === '' || p === '.') continue
          if (p === '..') out.pop()
          else out.push(p)
        }
        return out.join('/')
      }

      const dirOf = (p) => {
        const i = p.replace(/\\/g, '/').lastIndexOf('/')
        return i < 0 ? '' : p.slice(0, i)
      }

      function absolutizeSrcset(srcset, base) {
        return srcset
          .split(',')
          .map((part) => {
            const seg = part.trim()
            if (!seg) return ''
            const sp = seg.indexOf(' ')
            const url = sp < 0 ? seg : seg.slice(0, sp)
            const desc = sp < 0 ? '' : seg.slice(sp)
            if (isResolvedSrc(url)) return seg
            try {
              return new URL(url, base).href + desc
            } catch (_) {
              return seg
            }
          })
          .filter(Boolean)
          .join(', ')
      }

      function annotateBroken(img, why) {
        img.setAttribute('title', 'image unavailable: ' + (why || 'not found'))
        img.setAttribute('data-atelier-broken', '1')
      }

      // Make images load despite the in-doc render's opaque origin. Remote pages: rewrite relative
      // URLs to absolute against the page URL (the network loads them). Local/agent content: fetch
      // each relative image through the host bridge (cwd-scoped) and swap in a data: URL.
      async function resolveImages(container) {
        const imgs = Array.from(container.querySelectorAll('img'))
        if (state.remote) {
          for (const img of imgs) {
            const src = img.getAttribute('src')
            if (src && !isResolvedSrc(src)) {
              try {
                img.src = new URL(src, state.base).href
              } catch (_) {
                /* leave it */
              }
            }
            const ss = img.getAttribute('srcset')
            if (ss) img.setAttribute('srcset', absolutizeSrcset(ss, state.base))
          }
          for (const s of container.querySelectorAll('source[srcset]')) {
            s.setAttribute('srcset', absolutizeSrcset(s.getAttribute('srcset'), state.base))
          }
          return
        }
        const baseDir = dirOf(state.base)
        for (const img of imgs) {
          const src = img.getAttribute('src')
          if (!src || isResolvedSrc(src) || !img.isConnected) continue
          try {
            const r = await window.atelier.data.readAsset(joinPath(baseDir, src))
            if (!img.isConnected) continue // a newer render replaced it while we awaited
            if (r && r.dataUrl) img.src = r.dataUrl
            else annotateBroken(img, r && r.error)
          } catch (e) {
            annotateBroken(img, e && e.message)
          }
        }
      }

      let toastTimer = null
      function toast(msg) {
        const t = el('toast')
        t.textContent = msg
        t.classList.add('show')
        clearTimeout(toastTimer)
        toastTimer = setTimeout(() => t.classList.remove('show'), 2600)
      }

      // ---- Minimal Markdown → HTML (common subset; not full CommonMark) ----
      function esc(s) {
        return s
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }
      function inline(s) {
        return esc(s)
          .replace(/`([^`]+)`/g, (_m, c) => '<code>' + c + '</code>')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" />')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>')
          .replace(/_([^_]+)_/g, '<em>$1</em>')
      }
      function mdToHtml(md) {
        const lines = md.replace(/\r\n/g, '\n').split('\n')
        const out = []
        let i = 0
        let listType = null
        const closeList = () => {
          if (listType) {
            out.push('</' + listType + '>')
            listType = null
          }
        }
        while (i < lines.length) {
          const line = lines[i]
          const fence = line.match(/^```(\w*)/)
          if (fence) {
            closeList()
            const body = []
            i++
            while (i < lines.length && !/^```/.test(lines[i])) body.push(lines[i++])
            i++
            out.push('<pre><code>' + esc(body.join('\n')) + '</code></pre>')
            continue
          }
          const h = line.match(/^(#{1,6})\s+(.*)$/)
          if (h) {
            closeList()
            const n = h[1].length
            out.push('<h' + n + '>' + inline(h[2]) + '</h' + n + '>')
            i++
            continue
          }
          if (/^\s*(-{3,}|\*{3,})\s*$/.test(line)) {
            closeList()
            out.push('<hr />')
            i++
            continue
          }
          if (/^\s*>\s?/.test(line)) {
            closeList()
            out.push('<blockquote>' + inline(line.replace(/^\s*>\s?/, '')) + '</blockquote>')
            i++
            continue
          }
          const ul = line.match(/^\s*[-*+]\s+(.*)$/)
          const ol = line.match(/^\s*\d+\.\s+(.*)$/)
          if (ul || ol) {
            const want = ul ? 'ul' : 'ol'
            if (listType !== want) {
              closeList()
              out.push('<' + want + '>')
              listType = want
            }
            out.push('<li>' + inline((ul || ol)[1]) + '</li>')
            i++
            continue
          }
          if (/^\s*$/.test(line)) {
            closeList()
            i++
            continue
          }
          closeList()
          out.push('<p>' + inline(line) + '</p>')
          i++
        }
        closeList()
        return out.join('\n')
      }

      function looksLikeHtml(text) {
        return /^\s*<(!doctype|html|div|section|main|article|body|h[1-6]|p|ul|ol|table|span|a|img|svg|form|button)/i.test(
          text
        )
      }

      // ---- Rendering ----
      function runScripts(container) {
        // innerHTML-inserted <script>s don't execute; re-create them so pushed/loaded JS runs.
        for (const old of Array.from(container.querySelectorAll('script'))) {
          const s = document.createElement('script')
          for (const a of Array.from(old.attributes)) s.setAttribute(a.name, a.value)
          s.textContent = old.textContent
          old.replaceWith(s)
        }
      }

      function interceptLinks(container) {
        container.addEventListener('click', (e) => {
          const a = e.target && e.target.closest ? e.target.closest('a') : null
          if (!a) return
          const href = a.getAttribute('href') || ''
          if (href.startsWith('#')) {
            e.preventDefault()
            const target = container.querySelector(href)
            if (target) target.scrollIntoView({ behavior: 'smooth' })
            return
          }
          if (isUrl(href)) {
            // Follow the link through the host-side url: fetch — basic click-through browsing.
            e.preventDefault()
            pathInput.value = href
            loadSource(href)
          }
          // relative/other links fall through; there is no page to navigate to in-doc.
        })
      }

      function render() {
        const html = looksLikeHtml(state.raw) ? state.raw : mdToHtml(state.raw)
        if (state.mode === 'source') {
          sourceEl.textContent = state.raw
          sourceEl.classList.remove('hidden')
          pageEl.classList.add('hidden')
        } else {
          pageEl.innerHTML = html
          if (runScriptsCb.checked && !state.remote) runScripts(pageEl)
          interceptLinks(pageEl)
          void resolveImages(pageEl)
          pageEl.classList.remove('hidden')
          sourceEl.classList.add('hidden')
        }
        captureState()
        updateStatus()
      }

      function setContent(raw, label) {
        state.raw = raw || ''
        state.label = label || 'content'
        render()
      }

      // ---- State + snapshot exports ----
      function describe() {
        const text = (pageEl.innerText || '').trim()
        const links = Array.from(pageEl.querySelectorAll('a, button, input, [role=button]'))
          .slice(0, 30)
          .map((n) => {
            const t = (n.innerText || n.value || n.getAttribute('aria-label') || '').trim()
            const tag = n.tagName.toLowerCase()
            return t ? '• ' + tag + ': ' + t.slice(0, 60) : null
          })
          .filter(Boolean)
        return { text, links }
      }

      function captureState() {
        if (!streamCb.checked) {
          setExport('page', '')
          return
        }
        if (state.live) return // the live surface's state is captured via browser.read()
        const d = describe()
        let s = 'SOURCE: ' + state.label + '\n\nVISIBLE TEXT:\n' + d.text.slice(0, 4000)
        if (d.text.length > 4000) s += '\n… [truncated]'
        if (d.links.length) s += '\n\nINTERACTIVE:\n' + d.links.join('\n')
        setExport('page', s)
      }

      async function takeSnapshot() {
        if (state.live) {
          try {
            const p = await window.atelier.browser.read({ includeHtml: true })
            let s =
              'SNAPSHOT @ ' + new Date().toISOString() + '\nSOURCE: ' + (p.url || state.liveUrl)
            if (p.title) s += '\nTITLE: ' + p.title
            s += '\n\nVISIBLE TEXT:\n' + (p.text || '')
            if (p.links && p.links.length) s += '\n\nINTERACTIVE:\n' + p.links.join('\n')
            if (p.html) s += '\n\nHTML:\n' + p.html
            setExport('snapshot', s)
            toast('Snapshot sent to the agent')
          } catch (e) {
            toast('Snapshot failed: ' + (e && e.message ? e.message : String(e)))
          }
          return
        }
        const d = describe()
        // Collapse inlined data: URIs (resolved images) so they don't eat the HTML budget.
        const html = (state.mode === 'source' ? '' : pageEl.innerHTML)
          .replace(/data:[^"')\s]{64,}/g, 'data:[inlined]')
          .slice(0, 8000)
        let s = 'SNAPSHOT @ ' + new Date().toISOString() + '\nSOURCE: ' + state.label
        s += '\n\nVISIBLE TEXT:\n' + d.text.slice(0, 3000)
        if (d.links.length) s += '\n\nINTERACTIVE:\n' + d.links.join('\n')
        if (html) s += '\n\nHTML:\n' + html
        setExport('snapshot', s)
        toast('Snapshot sent to the agent')
      }

      let lastExport = {}
      function setExport(key, value) {
        if (lastExport[key] === value) return
        lastExport[key] = value
        try {
          window.atelier.context.set(key, value)
        } catch (_) {
          /* host not ready */
        }
      }

      function updateStatus() {
        const chars = state.raw.length
        const stream = streamCb.checked ? '<b>state→agent ON</b>' : 'state→agent off'
        statusEl.innerHTML =
          state.label === 'empty'
            ? 'empty — set a source (file or URL) or push content'
            : state.live
              ? state.label + ' · live browser · ' + stream
              : state.label + ' · ' + chars + ' chars · ' + state.mode + ' · ' + stream
      }

      // Re-capture live state as the user interacts (debounced).
      let stateTimer = null
      new MutationObserver(() => {
        clearTimeout(stateTimer)
        stateTimer = setTimeout(captureState, 300)
      }).observe(pageEl, { subtree: true, childList: true, characterData: true, attributes: true })

      // ---- Source loading (DataBus file:/url: channels) ----
      function dropChannel() {
        if (!state.channel) return
        try {
          window.atelier.data.unsubscribe(state.channel)
        } catch (_) {
          /* ignore */
        }
        state.channel = null
      }

      // ---- Live browsing (host-owned Chromium surface; permission "browser:embed") ----
      // URLs prefer this: real JS, real in-page navigation, composited over #view. The plugin only
      // drives it over atelier.browser.* and reads extracted state back for the page/snapshot
      // exports. When the surface is unavailable (or open fails), URLs fall back to the static
      // host-fetch render below.
      let boundsWatched = false
      function pushBounds() {
        const r = el('view').getBoundingClientRect()
        window.atelier.browser
          .setBounds({ x: r.left, y: r.top, w: r.width, h: r.height })
          .catch(function () {})
      }
      function watchBounds() {
        if (boundsWatched) return
        boundsWatched = true
        new ResizeObserver(pushBounds).observe(el('view'))
        window.addEventListener('resize', pushBounds)
      }
      async function goLive(src) {
        watchBounds()
        pushBounds()
        await window.atelier.browser.open(src) // rejects → caller falls back to the static fetch
        dropChannel()
        state.live = true
        state.liveUrl = src
        state.remote = true
        state.base = src
        state.label = src
        state.loading = true
        updateNav()
        updateStatus()
      }
      function endLive() {
        if (!state.live) return
        state.live = false
        state.webNav = { back: false, fwd: false }
        window.atelier.browser.close().catch(function () {})
      }
      let readTimer = null
      function scheduleRead() {
        clearTimeout(readTimer)
        readTimer = setTimeout(readLive, 400)
      }
      async function readLive() {
        if (!state.live) return
        try {
          const p = await window.atelier.browser.read()
          state.label = p.url || state.liveUrl
          if (streamCb.checked) {
            let s = 'SOURCE: ' + state.label
            if (p.title) s += '\nTITLE: ' + p.title
            s += '\n\nVISIBLE TEXT:\n' + (p.text || '')
            if (p.links && p.links.length) s += '\n\nINTERACTIVE:\n' + p.links.join('\n')
            setExport('page', s)
          }
          updateStatus()
        } catch (_) {
          /* surface gone; next nav re-opens it */
        }
      }
      window.atelier.on('browser', function (p) {
        if (!p || !state.live) return
        state.webNav = { back: !!p.canGoBack, fwd: !!p.canGoForward }
        if (p.type === 'nav' && p.url) {
          state.liveUrl = p.url
          state.label = p.url
          pathInput.value = p.url
          window.atelier.storage.set('path', p.url)
          scheduleRead()
        }
        if (p.type === 'loading') state.loading = true
        if (p.type === 'loaded') {
          state.loading = false
          scheduleRead()
        }
        if (p.type === 'failed') {
          state.loading = false
          toast('Load failed: ' + (p.error || 'unknown error'))
        }
        updateNav()
        updateStatus()
      })

      // ---- Navigation (history + in-flight state) ----
      function updateNav() {
        el('nav-back').disabled = !(state.live && state.webNav.back) && state.histIdx <= 0
        el('nav-fwd').disabled =
          !(state.live && state.webNav.fwd) && state.histIdx >= state.history.length - 1
        el('nav-reload').disabled = !state.live && state.histIdx < 0
        el('nav-stop').disabled = !state.loading
      }

      // Subscribe to a source's DataBus channel and render whatever arrives. Does NOT touch history —
      // callers (navigate/back/forward/reload) own that. `src` is a cwd-relative file path
      // (live-tailed) or an http(s) URL (one-shot host fetch; re-opening the channel refetches).
      function openSource(src) {
        if (isUrl(src)) {
          // Prefer the live Chromium surface; on failure (permission missing, host predates
          // webview support, bad URL) fall back to the static one-shot fetch render.
          goLive(src)
            .then(function () {
              window.atelier.storage.set('path', src)
            })
            .catch(function () {
              endLive() // a still-showing surface would cover the fallback render
              openFetched(src)
            })
          return
        }
        endLive()
        openFetched(src)
      }
      function openFetched(src) {
        dropChannel()
        const remote = isUrl(src)
        const channel = (remote ? 'url:' : 'file:') + src
        state.channel = channel
        state.remote = remote
        state.base = src // images in this content resolve against the source path/URL
        state.loading = true
        updateNav()
        if (remote) toast('Fetching ' + src + ' …')
        const done = () => {
          state.loading = false
          updateNav()
        }
        window.atelier.data
          .subscribe(channel, (data) => {
            done()
            if (data && typeof data === 'object' && 'error' in data) {
              setContent('# Could not load\n\n' + String(data.error), src)
              return
            }
            // render() auto-detects: HTML-looking content renders as HTML, otherwise as Markdown.
            setContent(typeof data === 'string' ? data : String(data), src)
          })
          .catch((e) => {
            done()
            setContent('# Load failed\n\n' + (e && e.message ? e.message : String(e)), src)
          })
        // The last-loaded source doubles as the restore key AND the "already consumed" marker
        // that keeps a stale `source` context value from overriding newer input on reload.
        window.atelier.storage.set('path', src)
      }

      // Load `src` and record it as a new history entry (truncating any forward entries — a fresh
      // navigation abandons the forward stack, like a real browser). Empty input is a no-op.
      function navigate(input, push) {
        const src = (input || '').trim()
        if (!src) return
        if (push !== false) {
          state.history = state.history.slice(0, state.histIdx + 1)
          // Collapse a reload-in-place: navigating to the current source again shouldn't grow history.
          if (state.history[state.histIdx] !== src) {
            state.history.push(src)
            state.histIdx = state.history.length - 1
          }
        }
        pathInput.value = src
        openSource(src)
        updateNav()
      }
      // Back-compat alias: existing call sites navigate-with-history.
      const loadSource = (input) => navigate(input, true)

      function goTo(idx) {
        if (idx < 0 || idx >= state.history.length) return
        state.histIdx = idx
        const src = state.history[idx]
        pathInput.value = src
        openSource(src)
        updateNav()
      }
      function goBack() {
        // The live surface's own history first; past its start, fall back to the source history.
        if (state.live && state.webNav.back) {
          window.atelier.browser.back().catch(function () {})
          return
        }
        if (state.histIdx > 0) goTo(state.histIdx - 1)
      }
      function goForward() {
        if (state.live && state.webNav.fwd) {
          window.atelier.browser.forward().catch(function () {})
          return
        }
        if (state.histIdx < state.history.length - 1) goTo(state.histIdx + 1)
      }
      function reload() {
        if (state.live) {
          window.atelier.browser.reload().catch(function () {})
          return
        }
        if (state.histIdx >= 0) openSource(state.history[state.histIdx])
      }
      function stop() {
        if (!state.loading) return
        if (state.live) {
          window.atelier.browser.stop().catch(function () {})
        } else {
          dropChannel() // unsubscribe → a pending fetch/tail result is dropped
        }
        state.loading = false
        updateNav()
        toast('Stopped')
      }

      // ---- Wiring ----
      el('load').addEventListener('click', () => navigate(pathInput.value, true))
      pathInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') navigate(pathInput.value, true)
      })
      el('nav-back').addEventListener('click', goBack)
      el('nav-fwd').addEventListener('click', goForward)
      el('nav-reload').addEventListener('click', reload)
      el('nav-stop').addEventListener('click', stop)
      el('clear').addEventListener('click', () => {
        dropChannel()
        endLive()
        state.remote = false
        state.base = ''
        state.history = []
        state.histIdx = -1
        state.loading = false
        window.atelier.storage.set('path', '')
        setContent('', 'empty')
        updateNav()
      })
      el('snapshot').addEventListener('click', takeSnapshot)
      streamCb.addEventListener('change', () => {
        captureState()
        if (state.live && streamCb.checked) scheduleRead()
        updateStatus()
        window.atelier.storage.set('stream', streamCb.checked ? '1' : '0')
      })
      runScriptsCb.addEventListener('change', () => {
        window.atelier.storage.set('runScripts', runScriptsCb.checked ? '1' : '0')
        render()
      })
      function setMode(mode) {
        state.mode = mode
        el('mode-rendered').classList.toggle('on', mode === 'rendered')
        el('mode-source').classList.toggle('on', mode === 'source')
        window.atelier.storage.set('mode', mode)
        render()
      }
      el('mode-rendered').addEventListener('click', () => setMode('rendered'))
      el('mode-source').addEventListener('click', () => setMode('source'))

      // Agent input (host fires a 'context' event when the agent writes an export).
      // `source` → load that path/URL; `content` → show the pushed fragment directly.
      window.atelier.on('context', async (p) => {
        if (!p || (p.key !== 'content' && p.key !== 'source')) return
        try {
          const v = await window.atelier.context.get(p.key)
          if (typeof v !== 'string' || !v) return
          if (p.key === 'source') {
            pathInput.value = v.trim()
            loadSource(v)
          } else {
            // A direct push replaces whatever was loaded — stop tailing it and clear the restore
            // key so the pushed content (not the old source) is what a reload brings back.
            dropChannel()
            endLive()
            state.remote = false
            state.base = '' // relative images in a pushed fragment resolve from the cwd root
            window.atelier.storage.set('path', '')
            setContent(v, 'agent')
          }
        } catch (_) {
          /* ignore */
        }
      })

      window.atelier.on('load', async () => {
        try {
          const [savedStream, savedRun, savedMode, savedPath] = await Promise.all([
            window.atelier.storage.get('stream'),
            window.atelier.storage.get('runScripts'),
            window.atelier.storage.get('mode'),
            window.atelier.storage.get('path')
          ])
          if (savedStream === '0') streamCb.checked = false
          if (savedRun === '0') runScriptsCb.checked = false
          if (savedMode === 'source') {
            state.mode = 'source'
            el('mode-rendered').classList.remove('on')
            el('mode-source').classList.add('on')
          }
          // Restore order: a `source` the agent set that we have NOT yet consumed (≠ saved path,
          // e.g. it arrived while this pane was disposed) wins; then the last-loaded source; then
          // agent-pushed content; then the welcome page. Exact recency between a source-set and a
          // content-push that both happened while disposed is unknowable — source wins by policy.
          const last = typeof savedPath === 'string' ? savedPath : ''
          const src = await window.atelier.context.get('source')
          const wanted = typeof src === 'string' ? src.trim() : ''
          if (wanted && wanted !== last) {
            pathInput.value = wanted
            loadSource(wanted)
          } else if (last) {
            pathInput.value = last
            loadSource(last)
          } else {
            const pushed = await window.atelier.context.get('content')
            if (typeof pushed === 'string' && pushed) setContent(pushed, 'agent')
            else {
              setContent(
                '# Browser\n\nThis surface renders a file, a fetched URL, or HTML/Markdown the agent pushes.\n\n- The agent points it at a file or URL via `set_browser__source` (or pushes a small fragment via `set_browser__content`).\n- Load a project file or an https:// URL with the box above.\n- Your live view goes back to the agent as the **page state**; hit **Snapshot** for a frozen capture.',
                'welcome'
              )
            }
          }
          updateStatus()
        } catch (_) {
          updateStatus()
        }
      })
    </script>
  </body>
</html>
