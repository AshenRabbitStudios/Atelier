<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Host runtime — injects window.atelier (all methods async).
      MUST be the FIRST element in <head>. No external network / no CDN.

      This pane is a visual SPREADSHEET backed by the context key "table".
      The value is CSV/TSV text (first row = headers). The agent reads/rewrites
      that whole string via its tool; the grid renders it and re-serializes on
      every edit, so the human and the agent share one document.

      CSV / TSV rules (see spreadsheet.js):
        - First row = headers. Comma-separated by default.
        - TAB auto-detected per file → treated as TSV.
        - Quoted fields "…" may contain commas; "" = an escaped quote.
        - Parser never throws — it renders what it can.

      Formulas (optional, tiny vanilla engine): a cell starting with "=" is
      stored verbatim in the CSV (round-trips to the agent) but DISPLAYS its
      computed value. Supports + - * / ( ), cell refs (A1 = first body row),
      and SUM / AVERAGE / MIN / MAX / COUNT / PRODUCT over ranges (A1:A9).
      Any parse/eval problem shows "#ERR" and never throws.
    -->
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <title>Data Table</title>
    <link rel="stylesheet" href="atelier-plugin://data-table/styles.css" />
  </head>
  <body>
    <div id="root">
      <div id="toolbar">
        <div id="cellref" title="Selected cell">—</div>
        <div id="fx" title="Cell content / formula">fx</div>
        <input
          id="formula-input"
          type="text"
          spellcheck="false"
          autocomplete="off"
          placeholder="Select a cell — its value or =formula shows here"
        />
      </div>

      <div id="grid-scroll">
        <div id="hint"></div>
      </div>

      <div id="statusbar">
        <span id="status-left">connecting…</span>
        <span id="status-right"></span>
      </div>
    </div>

    <script src="atelier-plugin://data-table/spreadsheet.js"></script>
  </body>
</html>
