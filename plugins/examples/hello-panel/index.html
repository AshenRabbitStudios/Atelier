<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hello Panel</title>
    <!-- The host runtime injects window.atelier; the plugin reaches the app only through it. -->
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <!-- Canonical plugin body: tokens ONLY (the host pushes the active theme's --vars in via the
         runtime, so a plugin reads native and reskins with the app). Copy this as the bar. -->
    <style>
      body {
        margin: 0;
        font-family: var(--font, system-ui, sans-serif);
        background: var(--surface, #14171e);
        color: var(--text, #e7eaf0);
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      code {
        font-family: var(--mono, monospace);
        color: var(--accent, #5b9cff);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        background: var(--input, #1b2029);
        color: var(--text, #e7eaf0);
        border: 1px solid var(--border, #252b37);
        border-radius: 6px;
        outline: none;
      }
      input:focus {
        border-color: var(--accent, #5b9cff);
      }
      .hint {
        color: var(--faint, #5e6677);
        font-size: 12px;
        margin-top: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        padding: 6px 10px;
        background: var(--surface-3, #202634);
        color: var(--text, #e7eaf0);
        border: 1px solid var(--border, #252b37);
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--border-2, #333b4b);
      }
    </style>
  </head>
  <body>
    <h1>👋 Hello Panel</h1>
    <p>
      A note saved via the host <code>storage</code> API. It survives reload and conversation
      switch.
    </p>
    <input id="note" placeholder="Type a note — it persists…" />
    <div class="row">
      <button id="dock-left">Dock left</button>
      <button id="dock-right">Dock right</button>
      <button id="float">Float</button>
    </div>
    <div class="hint" id="status">connecting…</div>

    <script>
      const note = document.getElementById('note')
      const status = document.getElementById('status')

      // Rebuild the pane from storage on every mount (treat each mount as a restore).
      window.atelier.on('load', async () => {
        try {
          const saved = await window.atelier.storage.get('note')
          if (typeof saved === 'string') note.value = saved
          status.textContent = 'ready · saved value restored'
        } catch (e) {
          status.textContent = 'storage unavailable: ' + e.message
        }
      })

      let t
      note.addEventListener('input', () => {
        clearTimeout(t)
        t = setTimeout(async () => {
          await window.atelier.storage.set('note', note.value)
          status.textContent = 'saved ✓'
        }, 250)
      })

      document.getElementById('dock-left').onclick = () => window.atelier.layout.dock('left')
      document.getElementById('dock-right').onclick = () => window.atelier.layout.dock('right')
      document.getElementById('float').onclick = () => window.atelier.layout.float()
    </script>
  </body>
</html>
