<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hello Panel</title>
    <!-- The host runtime injects window.atelier; the plugin reaches the app only through it. -->
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font:
          14px/1.5 system-ui,
          sans-serif;
        background: #1e1e1e;
        color: #e6e6e6;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        background: #2a2a2a;
        color: #e6e6e6;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
      }
      .hint {
        color: #9a9a9a;
        font-size: 12px;
        margin-top: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        padding: 6px 10px;
        background: #2a2a2a;
        color: #e6e6e6;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>👋 Hello Panel</h1>
    <p>
      A note saved via the host <code>storage</code> API. It survives reload and conversation
      switch.
    </p>
    <input id="note" placeholder="Type a note — it persists…" />
    <div class="row">
      <button id="dock-left">Dock left</button>
      <button id="dock-right">Dock right</button>
      <button id="float">Float</button>
    </div>
    <div class="hint" id="status">connecting…</div>

    <script>
      const note = document.getElementById('note')
      const status = document.getElementById('status')

      // Rebuild the pane from storage on every mount (treat each mount as a restore).
      window.atelier.on('load', async () => {
        try {
          const saved = await window.atelier.storage.get('note')
          if (typeof saved === 'string') note.value = saved
          status.textContent = 'ready · saved value restored'
        } catch (e) {
          status.textContent = 'storage unavailable: ' + e.message
        }
      })

      let t
      note.addEventListener('input', () => {
        clearTimeout(t)
        t = setTimeout(async () => {
          await window.atelier.storage.set('note', note.value)
          status.textContent = 'saved ✓'
        }, 250)
      })

      document.getElementById('dock-left').onclick = () => window.atelier.layout.dock('left')
      document.getElementById('dock-right').onclick = () => window.atelier.layout.dock('right')
      document.getElementById('float').onclick = () => window.atelier.layout.float()
    </script>
  </body>
</html>
