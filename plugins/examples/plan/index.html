<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Plan</title>
    <!-- Host runtime injects window.atelier; the plugin reaches the app only through it. -->
    <script src="atelier-plugin://__runtime__/atelier.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: var(--font, system-ui, sans-serif);
        background: var(--surface, #14171e);
        color: var(--text, #e7eaf0);
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Header */
      .header {
        flex-shrink: 0;
        padding: 9px 14px 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--dim, #8b95a8);
        border-bottom: 1px solid var(--border, #252b37);
      }

      /* Checklist preview — shown only when checklist items exist */
      .checklist {
        flex-shrink: 0;
        max-height: 156px;
        overflow-y: auto;
        padding: 6px 14px 4px;
        border-bottom: 1px solid var(--border, #252b37);
        display: none;
      }
      .checklist.has-items {
        display: block;
      }
      .check-row {
        display: flex;
        align-items: baseline;
        gap: 7px;
        font-family: var(--mono, monospace);
        font-size: 12px;
        line-height: 1.65;
        color: var(--text, #e7eaf0);
        user-select: none;
      }
      .check-row input[type='checkbox'] {
        flex-shrink: 0;
        pointer-events: none;
        accent-color: var(--accent, #5b9cff);
        margin-top: 2px;
      }
      .check-row.done .label {
        color: var(--dim, #8b95a8);
        text-decoration: line-through;
      }

      /* Editable textarea — fills remaining height */
      textarea {
        flex: 1;
        min-height: 0;
        width: 100%;
        padding: 12px 14px;
        font-family: var(--mono, monospace);
        font-size: 13px;
        line-height: 1.65;
        background: transparent;
        color: var(--text, #e7eaf0);
        border: none;
        outline: none;
        resize: none;
        white-space: pre-wrap;
        overflow-y: auto;
      }
      textarea::placeholder {
        color: var(--faint, #5e6677);
      }
    </style>
  </head>
  <body>
    <div class="header">Plan — high-level path from A → B</div>
    <div class="checklist" id="checklist"></div>
    <textarea
      id="plan"
      placeholder="The agent will keep its high-level plan here. You can edit it too."
    ></textarea>

    <script>
      const ta = document.getElementById('plan')
      const clEl = document.getElementById('checklist')

      let lastValue = null // last known stored value (for poll diffing)
      let debounce = null // write-back debounce timer
      let pollId = null // setInterval handle

      /* ── helpers ── */

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      }

      function renderChecklist(text) {
        var rows = []
        var lines = text.split('\n')
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i]
          var doneM = line.match(/^[-*] \[x\]\s*(.*)/i)
          var todoM = line.match(/^[-*] \[ \]\s*(.*)/)
          if (doneM) {
            rows.push({ done: true, text: doneM[1] })
          } else if (todoM) {
            rows.push({ done: false, text: todoM[1] })
          }
        }
        if (rows.length === 0) {
          clEl.innerHTML = ''
          clEl.classList.remove('has-items')
          return
        }
        clEl.innerHTML = rows
          .map(function (r) {
            return (
              '<div class="check-row' +
              (r.done ? ' done' : '') +
              '">' +
              '<input type="checkbox"' +
              (r.done ? ' checked' : '') +
              ' />' +
              '<span class="label">' +
              escHtml(r.text) +
              '</span>' +
              '</div>'
            )
          })
          .join('')
        clEl.classList.add('has-items')
      }

      function applyValue(v) {
        var text = typeof v === 'string' ? v : ''
        ta.value = text
        lastValue = text
        renderChecklist(text)
      }

      /* ── lifecycle ── */

      window.atelier.on('load', async function () {
        try {
          var v = await window.atelier.context.get('plan')
          applyValue(v || '')
        } catch (_) {
          applyValue('')
        }
        startPolling()
      })

      function startPolling() {
        if (pollId !== null) clearInterval(pollId)
        pollId = setInterval(async function () {
          // Never clobber active typing
          if (document.activeElement === ta) return
          try {
            var v = await window.atelier.context.get('plan')
            var text = typeof v === 'string' ? v : ''
            if (text !== lastValue) {
              applyValue(text)
            }
          } catch (_) {}
        }, 1500)
      }

      /* ── user edits ── */

      ta.addEventListener('input', function () {
        clearTimeout(debounce)
        debounce = setTimeout(async function () {
          var val = ta.value
          lastValue = val
          renderChecklist(val)
          try {
            await window.atelier.context.set('plan', val)
          } catch (_) {}
        }, 400)
      })
    </script>
  </body>
</html>
